<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Barraca da Cris PRO 7.0 Enterprise</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0f172a;color:white;font-family:Arial;padding:10px;padding-bottom:120px}.app{max-width:560px;margin:auto}.box,.tela,.top{background:#1e293b;border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:0 3px 12px #0005}.tela{display:none}.ativa{display:block}h1{margin:0;color:#60a5fa}input,select,textarea{width:100%;padding:13px;border-radius:12px;border:1px solid #334155;background:#111827;color:white;font-size:16px;margin-bottom:9px}textarea{height:55px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn,.prod{border:0;border-radius:13px;padding:14px;font-weight:bold;font-size:15px}.azul{background:#2563eb;color:white}.verde{background:#16a34a;color:white}.laranja{background:#f59e0b;color:white}.vermelho{background:#ef4444;color:white}.roxo{background:#7c3aed;color:white}.cinza{background:#475569;color:white}.prod{background:#2563eb;color:white;min-height:75px}.cat{background:#2563eb;border-radius:12px;padding:12px;font-size:20px;font-weight:bold;margin:18px 0 10px}.item,.card{border:1px solid #334155;border-radius:12px;padding:10px;margin:8px 0;background:#111827}.total{text-align:right;font-size:24px;font-weight:bold}.nav{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);max-width:560px;width:calc(100% - 16px);display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:#020617;border-radius:18px;padding:7px}.nav button{background:transparent;color:white;border:0;border-radius:12px;padding:8px;font-size:11px}.nav button span{display:block;font-size:20px}.badge{padding:4px 8px;border-radius:999px;color:white;font-size:12px}.tabela{width:100%;border-collapse:collapse;font-size:14px}.tabela th,.tabela td{border-bottom:1px solid #334155;padding:7px 4px;text-align:left}.tabela td:last-child,.tabela th:last-child{text-align:right}.preparo{background:#f59e0b}.pronto{background:#16a34a}.entregue{background:#2563eb}.cancelado{background:#ef4444}#toast{display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#020617;padding:12px;border-radius:12px}.modalbg{display:none;position:fixed;inset:0;background:#0009;z-index:60;padding:18px}.modal{max-width:560px;margin:40px auto;background:#1e293b;color:white;border-radius:18px;padding:16px;max-height:88vh;overflow:auto}#cupom{display:none}@media print{@page{size:58mm auto;margin:0}body{background:white;color:black;padding:0}.app,.nav,#toast{display:none!important}#cupom{display:block!important;width:56mm;padding:1mm;font-family:monospace;font-size:10px;color:#000}.linha{border-top:1px dashed #000;margin:4px 0}.centro{text-align:center}.row{display:flex;justify-content:space-between}}
</style>
</head>
<body>
<div class="app">
<div class="top"><h1>Barraca da Cris</h1><small id="sub">PRO 7.0 • Enterprise</small></div>

<section id="login" class="tela ativa">
<h2>Entrar</h2>
<select id="perfil"><option value="atendimento">Atendimento</option><option value="cozinha">Cozinha</option><option value="caixa">Caixa</option><option value="adm">ADM</option></select>
<input id="senha" type="password" placeholder="Senha">
<button class="btn azul" style="width:100%" onclick="entrar()">Entrar</button>
<div class="box"><b>Segurança:</b><br>Após 3 tentativas erradas, o login bloqueia por 60 segundos.<br><small>As senhas podem ser alteradas no ADM.</small></div>
</section>

<section id="inicio" class="tela"><h2>Início</h2><div id="menu" class="grid"></div><div id="resumo" class="box"></div></section>

<section id="pedido" class="tela"><h2>Novo Pedido</h2>
<input id="cliente" placeholder="Mesa / Cliente">
<select id="pagamento"><option>PIX</option><option>Dinheiro</option><option>Cartão Débito</option><option>Cartão Crédito</option></select>
<input id="valorPago" type="number" step="0.01" placeholder="Valor pago">
<textarea id="obs" placeholder="Observação"></textarea>
<input id="busca" placeholder="Pesquisar produto" oninput="renderProdutos()">
<div id="produtos"></div>
<div class="box"><h2>Pedido Atual</h2><div id="itens"></div><div class="total" id="total">R$ 0,00</div><div class="grid"><button class="btn verde" onclick="salvarPedido()">Salvar</button><button class="btn laranja" onclick="imprimirAtual()">Imprimir</button><button class="btn verde" onclick="whats()">WhatsApp</button><button class="btn vermelho" onclick="limparPedido()">Limpar</button></div></div>
</section>

<section id="cozinha" class="tela"><h2>Cozinha</h2><div class="grid"><button class="btn laranja" onclick="filtroCoz='preparo';renderCozinha()">Em preparo</button><button class="btn verde" onclick="filtroCoz='pronto';renderCozinha()">Prontos</button></div><div id="listaCozinha"></div></section>

<section id="caixa" class="tela"><h2>Caixa</h2><div class="grid"><button class="btn laranja" onclick="filtroCx='pronto';renderCaixa()">A receber</button><button class="btn verde" onclick="filtroCx='entregue';renderCaixa()">Entregues</button></div><div id="listaCaixa"></div></section>

<section id="adm" class="tela"><h2>ADM</h2><div class="grid"><button class="btn laranja" onclick="admProdutos()">Produtos</button><button class="btn verde" onclick="admRelatorio()">Relatórios</button><button class="btn azul" onclick="admFinanceiro()">Custos/Lucro</button><button class="btn verde" onclick="admCaixaPro()">Caixa PRO</button><button class="btn laranja" onclick="admEstoque()">Estoque</button><button class="btn azul" onclick="admDashboardPro()">Dashboard</button><button class="btn roxo" onclick="admAuditoria()">Auditoria</button><button class="btn cinza" onclick="admTefReady()">TEF Ready</button><button class="btn azul" onclick="admPedidos()">Corrigir</button><button class="btn roxo" onclick="admBackup()">Backup</button><button class="btn cinza" onclick="admConfig()">Config</button><button class="btn vermelho" onclick="sair()">Sair</button></div><div id="areaAdm" class="box"></div></section>
</div>

<nav class="nav"><button onclick="abrir('inicio')"><span>🏠</span>Início</button><button onclick="abrir('pedido')"><span>🧾</span>Pedido</button><button onclick="abrir('cozinha')"><span>👨‍🍳</span>Cozinha</button><button onclick="abrir('caixa')"><span>💰</span>Caixa</button><button onclick="abrir('adm')"><span>🔒</span>ADM</button></nav>
<div id="toast"></div><div id="cupom"></div><input id="file" type="file" accept=".json" style="display:none" onchange="restaurar(event)">


<div id="modalEditar" class="modalbg"><div class="modal">
<h2>Corrigir Pedido</h2>
<input id="editId" type="hidden">
<label>Cliente/Mesa</label><input id="editCliente">
<label>Pagamento</label><select id="editPagamento"><option>PIX</option><option>Dinheiro</option><option>Cartão Débito</option><option>Cartão Crédito</option></select>
<label>Valor pago</label><input id="editValorPago" type="number" step="0.01">
<label>Total</label><input id="editTotal" type="number" step="0.01">
<label>Status</label><select id="editStatus"><option value="preparo">preparo</option><option value="pronto">pronto</option><option value="entregue">entregue</option><option value="cancelado">cancelado</option></select>
<label>Observação</label><textarea id="editObs"></textarea>
<div id="editItens"></div>
<div class="grid"><button class="btn verde" onclick="salvarEdicao()">Salvar correção</button><button class="btn vermelho" onclick="$('modalEditar').style.display='none'">Cancelar</button></div>
</div></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import{getFirestore,collection,doc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={
  apiKey:"AIzaSyAG5pASeFhdvetSg017jo0qfAq_PUnYTvc",
  authDomain:"barraca-da-cris.firebaseapp.com",
  projectId:"barraca-da-cris",
  storageBucket:"barraca-da-cris.firebasestorage.app",
  messagingSenderId:"17815055743",
  appId:"1:17815055743:web:9555f474c4f6c3e3adfe4a",
  measurementId:"G-R0XEPR2VB2"
};
window.fb=false;if(firebaseConfig.apiKey&&!firebaseConfig.apiKey.includes("COLE_")){try{const app=initializeApp(firebaseConfig);window.db=getFirestore(app);window.fs={collection,doc,setDoc,onSnapshot};window.fb=true}catch(e){console.error(e)}}
</script>

<script>
const PAD=[{nome:"☕ Café",preco:2,categoria:"☕ Cafés"},{nome:"☕ Café com Leite",preco:3,categoria:"☕ Cafés"},{nome:"🍰 Bolo Fofo",preco:3,categoria:"🍰 Bolos"},{nome:"🥪 Pão Completo",preco:10,categoria:"🥪 Pães"}];
let produtos=JSON.parse(localStorage.getItem("produtos_bc")||"null")||PAD,categorias=JSON.parse(localStorage.getItem("cats_bc")||"null")||[...new Set(PAD.map(p=>p.categoria))],historico=JSON.parse(localStorage.getItem("hist_bc")||"[]"),custos=JSON.parse(localStorage.getItem("custos_bc")||"[]"),pedido=[],perfil=sessionStorage.getItem("perfil_bc")||"",filtroCoz="preparo",filtroCx="pronto",unsub=null,unsubCustos=null,syncing=false;
let senhas=JSON.parse(localStorage.getItem("senhas_bc")||'{"atendimento":"1111","cozinha":"2222","caixa":"3333","adm":"1234"}');
function $(id){return document.getElementById(id)}function money(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}function norm(t){return String(t||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}function save(){localStorage.setItem("produtos_bc",JSON.stringify(produtos));localStorage.setItem("cats_bc",JSON.stringify(categorias));localStorage.setItem("hist_bc",JSON.stringify(historico))}function toast(t){$("toast").textContent=t;$("toast").style.display="block";setTimeout(()=>$("toast").style.display="none",1600)}
function entrar(){
  let bloqueio=Number(localStorage.getItem("bloqueio_login_bc")||0);
  if(Date.now()<bloqueio){alert("Login bloqueado. Aguarde 60 segundos.");return}
  let p=$("perfil").value,s=$("senha").value,erros=Number(localStorage.getItem("erros_login_bc")||0);
  if(s===senhas[p]){
    perfil=p;
    sessionStorage.setItem("perfil_bc",p);
    localStorage.setItem("erros_login_bc",0);
    $("senha").value="";
    iniciar();
  }else{
    erros++;
    localStorage.setItem("erros_login_bc",erros);
    if(erros>=3){
      localStorage.setItem("bloqueio_login_bc",Date.now()+60000);
      localStorage.setItem("erros_login_bc",0);
      alert("Muitas tentativas. Login bloqueado por 60 segundos.");
    }else{
      alert("Senha incorreta");
    }
  }
}
function sair(){perfil="";sessionStorage.removeItem("perfil_bc");abrir("login")}
function pode(t){if(t==="login")return true;if(!perfil)return false;if(perfil==="adm")return true;return perfil===t||t==="inicio"||(perfil==="atendimento"&&t==="pedido")}
function abrir(t){if(!pode(t)){alert("Sem permissão");return}document.querySelectorAll(".tela").forEach(x=>x.classList.remove("ativa"));$(t).classList.add("ativa");$("sub").textContent="PRO 6.0 • "+(perfil||"login");if(t==="inicio")resumo();if(t==="pedido")renderProdutos();if(t==="cozinha")renderCozinha();if(t==="caixa")renderCaixa()}
function iniciar(){montarMenu();abrir("inicio");syncStart()}
function montarMenu(){let h="";if(perfil==="atendimento"||perfil==="adm")h+=`<button class="btn azul" onclick="abrir('pedido')">🧾 Pedido</button>`;if(perfil==="cozinha"||perfil==="adm")h+=`<button class="btn laranja" onclick="abrir('cozinha')">👨‍🍳 Cozinha</button>`;if(perfil==="caixa"||perfil==="adm")h+=`<button class="btn verde" onclick="abrir('caixa')">💰 Caixa</button>`;if(perfil==="adm")h+=`<button class="btn roxo" onclick="abrir('adm')">🔒 ADM</button>`;h+=`<button class="btn vermelho" onclick="sair()">Sair</button>`;$("menu").innerHTML=h}
function dedup(){let m=new Map();produtos.forEach(p=>m.set(norm(p.nome)+"|"+norm(p.categoria),p));produtos=[...m.values()].sort((a,b)=>norm(a.categoria).localeCompare(norm(b.categoria))||norm(a.nome).localeCompare(norm(b.nome)));categorias=[...new Set([...categorias,...produtos.map(p=>p.categoria)])].sort((a,b)=>norm(a).localeCompare(norm(b)));save()}
function renderProdutos(){dedup();let b=norm($("busca").value),lista=produtos.filter(p=>norm(p.nome).includes(b)||norm(p.categoria).includes(b));$("produtos").innerHTML="";[...new Set(lista.map(p=>p.categoria))].forEach(c=>{let div=document.createElement("div");div.className="cat";div.textContent=c;$("produtos").appendChild(div);let g=document.createElement("div");g.className="grid";lista.filter(p=>p.categoria===c).forEach(p=>{let bt=document.createElement("button");bt.className="prod";bt.innerHTML=p.nome+"<br>"+money(p.preco);bt.onclick=()=>add(p);g.appendChild(bt)});$("produtos").appendChild(g)})}
function add(p){let i=pedido.find(x=>norm(x.nome)===norm(p.nome)&&norm(x.categoria)===norm(p.categoria));if(i)i.qtd++;else pedido.push({...p,qtd:1});renderPedido()}
function renderPedido(){let total=0;$("itens").innerHTML="";pedido.forEach((i,n)=>{total+=i.qtd*i.preco;$("itens").innerHTML+=`<div class="item">${i.qtd}x ${i.nome}<br>${money(i.qtd*i.preco)} <button onclick="pedido.splice(${n},1);renderPedido()">X</button></div>`});$("total").textContent=money(total)}
function total(){return pedido.reduce((s,i)=>s+i.qtd*i.preco,0)}function num(){let n=Number(localStorage.getItem("num_bc")||0)+1;localStorage.setItem("num_bc",n);return n}
async function salvarPedido(){if(!pedido.length){alert("Adicione produtos");return}let n=num(),p={id:"p_"+Date.now()+"_"+n,numero:n,data:new Date().toISOString(),cliente:$("cliente").value||"Não informado",pagamento:$("pagamento").value,valorPago:Number($("valorPago").value||0),observacao:$("obs").value,itens:JSON.parse(JSON.stringify(pedido)),total:total(),status:"preparo",operador:perfil};historico.push(p);save();await syncPedido(p);await enviarPedidoParaPlanilha(p,true);toast("Pedido salvo");if(localStorage.getItem("auto_print")==="sim"){printCupom(p);setTimeout(()=>window.print(),250)}limparPedido();$("cliente").value=$("valorPago").value=$("obs").value=$("busca").value="";renderProdutos();resumo()}
function limparPedido(){pedido=[];renderPedido()}function printCupom(p){let h=`<div class=centro><b>BARRACA DA CRIS</b><br>PEDIDO Nº ${String(p.numero).padStart(3,"0")}</div><div class=linha></div>Cliente: ${p.cliente}<br>Pagamento: ${p.pagamento}<div class=linha></div>`;p.itens.forEach(i=>h+=`${i.qtd}x ${i.nome}<div class=row><span></span><span>${money(i.qtd*i.preco)}</span></div>`);h+=`<div class=linha></div><div class=row><b>TOTAL</b><b>${money(p.total)}</b></div><br>Obs: ${p.observacao||"-"}`;$("cupom").innerHTML=h}
function imprimirAtual(){if(!pedido.length)return alert("Adicione produtos");printCupom({numero:Number(localStorage.getItem("num_bc")||0)+1,cliente:$("cliente").value||"Não informado",pagamento:$("pagamento").value,itens:pedido,total:total(),observacao:$("obs").value});window.print()}function whats(){let t="BARRACA DA CRIS\n";pedido.forEach(i=>t+=`${i.qtd}x ${i.nome}\n`);t+="Total: "+money(total());open("https://wa.me/?text="+encodeURIComponent(t),"_blank")}
function card(p,modo){let its=p.itens.map(i=>`${i.qtd}x ${i.nome}`).join("<br>");return `<div class=card><h3>Pedido ${String(p.numero).padStart(3,"0")} <span class="badge ${p.status}">${p.status}</span></h3>${p.cliente}<br>${its}<br><b>${money(p.total)}</b><br>${modo==="cozinha"&&p.status==="preparo"?`<button class="btn verde" onclick="status('${p.id}','pronto')">Pronto</button>`:""}${modo==="caixa"&&p.status==="pronto"?`<button class="btn verde" onclick="status('${p.id}','entregue')">Receber</button>`:""}</div>`}
async function status(id,st){let p=historico.find(x=>x.id===id);if(p){p.status=st;save();await syncPedido(p);renderCozinha();renderCaixa();resumo()}}
function renderCozinha(){let l=historico.slice().reverse().filter(p=>p.status===filtroCoz);$("listaCozinha").innerHTML=l.map(p=>card(p,"cozinha")).join("")||"<div class=box>Nenhum pedido</div>"}
function renderCaixa(){let l=historico.slice().reverse().filter(p=>p.status===filtroCx);$("listaCaixa").innerHTML=`<div class=box>Total: ${money(l.reduce((s,p)=>s+p.total,0))}</div>`+(l.map(p=>card(p,"caixa")).join("")||"<div class=box>Nenhum pedido</div>")}
function resumo(){let l=historico.filter(p=>p.data?.slice(0,10)===new Date().toISOString().slice(0,10)&&p.status!=="cancelado");$("resumo").innerHTML=`Total hoje: <b>${money(l.reduce((s,p)=>s+p.total,0))}</b><br>Pedidos: ${l.length}<br>Preparo: ${historico.filter(p=>p.status==="preparo").length}<br>Nuvem: ${window.fb?"conectada":"não configurada"}`}
function admProdutos(){dedup();$("areaAdm").innerHTML=`<h3>Produtos</h3><input id=pn placeholder=Nome><input id=pp type=number placeholder=Preço><select id=pc>${categorias.map(c=>`<option>${c}</option>`).join("")}</select><button class="btn verde" onclick="addProd()">Adicionar</button><h3>Categorias</h3><input id=cn placeholder="Nova categoria"><button class="btn azul" onclick="addCat()">Adicionar categoria</button><div>${categorias.map(c=>`<div class=card>${c}<br><button class="btn vermelho" onclick="delCat('${c.replaceAll("'","")}')">Excluir categoria e produtos</button></div>`).join("")}</div><h3>Produtos</h3>${produtos.map((p,i)=>`<div class=card>${p.nome} - ${money(p.preco)}<br>${p.categoria}<br><button class="btn vermelho" onclick="produtos.splice(${i},1);save();syncConfig();enviarCatalogoParaPlanilha();admProdutos()">Excluir</button></div>`).join("")}`}
function addProd(){let n=$("pn").value,pr=Number($("pp").value),c=$("pc").value;if(!n||!pr)return;if(produtos.some(p=>norm(p.nome)===norm(n)&&norm(p.categoria)===norm(c)))return alert("Produto já existe");produtos.push({nome:n,preco:pr,categoria:c});save();syncConfig();enviarCatalogoParaPlanilha();admProdutos();renderProdutos()}
function addCat(){let c=$("cn").value.trim();if(!c)return;if(categorias.some(x=>norm(x)===norm(c)))return alert("Categoria já existe");categorias.push(c);save();syncConfig();enviarCatalogoParaPlanilha();admProdutos()}
function delCat(c){if(confirm("Excluir categoria e produtos?")){produtos=produtos.filter(p=>p.categoria!==c);categorias=categorias.filter(x=>x!==c);save();syncConfig();enviarCatalogoParaPlanilha();admProdutos();renderProdutos()}}
function relatorioPeriodo(ini,fim){
  let lista=historico.filter(p=>p.data?.slice(0,10)>=ini&&p.data?.slice(0,10)<=fim&&p.status!=="cancelado");
  let total=lista.reduce((s,p)=>s+Number(p.total||0),0),pg={},prod={},cat={};
  lista.forEach(p=>{
    pg[p.pagamento]=(pg[p.pagamento]||0)+Number(p.total||0);
    (p.itens||[]).forEach(i=>{
      prod[i.nome]=(prod[i.nome]||{qtd:0,total:0});
      prod[i.nome].qtd+=Number(i.qtd||0);
      prod[i.nome].total+=Number(i.qtd||0)*Number(i.preco||0);
      cat[i.categoria||"Sem categoria"]=(cat[i.categoria||"Sem categoria"]||0)+Number(i.qtd||0)*Number(i.preco||0);
    });
  });
  return{lista,total,pg,prod,cat};
}
function admRelatorio(){
  let h=new Date().toISOString().slice(0,10);
  $("areaAdm").innerHTML=`<h3>Relatórios Avançados</h3>
  <input id=iniRel type=date value="${h}">
  <input id=fimRel type=date value="${h}">
  <button class="btn verde" onclick="gerarRel()">Gerar</button>
  <button class="btn verde" onclick="enviarTodosPedidosParaPlanilha()">Enviar relatório para Google Sheets</button><button class="btn laranja" onclick="csv()">Baixar CSV</button>
  <div id=relOut></div>`;
  gerarRel();
}
function gerarRel(){
  let r=relatorioPeriodo($("iniRel").value,$("fimRel").value);
  let mais=Object.entries(r.prod).sort((a,b)=>b[1].qtd-a[1].qtd)[0];
  let out=`<div class=card>Total: <b>${money(r.total)}</b><br>Pedidos: ${r.lista.length}<br>Ticket médio: ${money(r.lista.length?r.total/r.lista.length:0)}<br>Mais vendido: ${mais?mais[0]+" ("+mais[1].qtd+")":"-"}</div>`;
  out+=`<h3>Pagamento</h3><table class=tabela><tr><th>Forma</th><th>Total</th></tr>`;
  Object.keys(r.pg).forEach(k=>out+=`<tr><td>${k}</td><td>${money(r.pg[k])}</td></tr>`);
  out+=`</table><h3>Categorias</h3><table class=tabela><tr><th>Categoria</th><th>Total</th></tr>`;
  Object.keys(r.cat).forEach(k=>out+=`<tr><td>${k}</td><td>${money(r.cat[k])}</td></tr>`);
  out+=`</table><h3>Produtos</h3><table class=tabela><tr><th>Produto</th><th>Qtd</th><th>Total</th></tr>`;
  Object.keys(r.prod).forEach(k=>out+=`<tr><td>${k}</td><td>${r.prod[k].qtd}</td><td>${money(r.prod[k].total)}</td></tr>`);
  out+="</table>";
  $("relOut").innerHTML=out;
}
function csv(){
  let ini=$("iniRel")?.value||"0000-01-01",fim=$("fimRel")?.value||"9999-12-31";
  let lista=historico.filter(p=>p.data?.slice(0,10)>=ini&&p.data?.slice(0,10)<=fim);
  let c="\ufeffData,Número,Cliente,Pagamento,Total,Status,Operador,Itens\n";
  lista.forEach(p=>c+=`"${p.data}","${p.numero}","${p.cliente}","${p.pagamento||""}","${p.total}","${p.status}","${p.operador||""}","${(p.itens||[]).map(i=>i.qtd+'x '+i.nome).join(' | ')}"\n`);
  baixar("vendas_"+ini+"_a_"+fim+".csv",c,"text/csv");
}

function dataLocalISO(d=new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function custosAtivos(){return (custos||[]).filter(c=>c.status!=="cancelado")}
function vendasPeriodo(ini,fim){return (historico||[]).filter(p=>(p.data||"").slice(0,10)>=ini&&(p.data||"").slice(0,10)<=fim&&p.status!=="cancelado")}
function custosPeriodo(ini,fim){return custosAtivos().filter(c=>(c.data||"").slice(0,10)>=ini&&(c.data||"").slice(0,10)<=fim)}
function resumoFinanceiro(ini,fim){
  const vendas=vendasPeriodo(ini,fim),gastos=custosPeriodo(ini,fim);
  const faturamento=vendas.reduce((s,p)=>s+Number(p.total||0),0);
  const totalCustos=gastos.reduce((s,c)=>s+Number(c.valor||0),0);
  const lucro=faturamento-totalCustos,margem=faturamento?lucro/faturamento*100:0,porCat={};
  gastos.forEach(c=>porCat[c.categoria||"Outros"]=(porCat[c.categoria||"Outros"]||0)+Number(c.valor||0));
  return{vendas,gastos,faturamento,totalCustos,lucro,margem,porCat};
}

function excelSheet(nome, linhas, opts={}){
  let safeName=String(nome).replace(/[\\\/\?\*\[\]:]/g," ").slice(0,31);
  let cols = opts.cols || 8;
  let widths = opts.widths || Array(cols).fill(120);
  let colXml = widths.map(w=>`<Column ss:Width="${w}"/>`).join("");
  let rows = linhas.map((linha,idx)=>{
    if(linha && linha.__title)return excelTitleRow(linha.__title, cols);
    return `<Row>${linha.map((c,i)=>{
      if(idx===0 || (linha.__header))return excelHeaderCell(c);
      if(c && typeof c==="object" && c.type==="money")return excelMoney(c.value);
      if(c && typeof c==="object" && c.type==="number")return excelData(Number(c.value||0));
      return excelData(c);
    }).join("")}</Row>`;
  }).join("");
  return `<Worksheet ss:Name="${excelXmlEscape(safeName)}"><Table>${colXml}${rows}</Table></Worksheet>`;
}
function resumoBackupExcel(){
  const hist=(historico||[]).filter(p=>p.status!=="cancelado");
  const total=hist.reduce((s,p)=>s+Number(p.total||0),0);
  const pedidos=hist.length;
  let itensVendidos=0, prod={};
  hist.forEach(p=>(p.itens||[]).forEach(i=>{
    itensVendidos+=Number(i.qtd||0);
    if(!prod[i.nome])prod[i.nome]={qtd:0,total:0};
    prod[i.nome].qtd+=Number(i.qtd||0);
    prod[i.nome].total+=Number(i.qtd||0)*Number(i.preco||0);
  }));
  const mais=Object.entries(prod).sort((a,b)=>b[1].qtd-a[1].qtd)[0];
  return {total,pedidos,itensVendidos,mais:mais?`${mais[0]} (${mais[1].qtd})`:"-"};
}

const GOOGLE_SHEETS_TOKEN = "1234";

function sheetsConfigurado(){

}

async function enviarPayloadParaPlanilha(payload,silencioso=false){
  if(!sheetsConfigurado()){
    if(!silencioso)alert("Google Sheets não configurado.");
    return false;
  }

  try{
    await fetch(GOOGLE_SHEETS_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({
        token:GOOGLE_SHEETS_TOKEN,
        ...payload
      })
    });

    return true;
  }catch(e){
    console.error("Erro ao enviar para Google Sheets",e);
    if(!silencioso)toast("Não foi possível enviar. Ficou pendente.");
    return false;
  }
}

}

function restaurar(e){

  let r=new FileReader();
  r.onload=()=>{

    produtos=b.produtos||produtos;
    categorias=b.categorias||categorias;
    historico=b.historico||historico;custos=b.custos||custos;
    senhas=b.senhas||senhas;
    if(b.num)localStorage.setItem("num_bc",b.num);
    if(b.auto_print)localStorage.setItem("auto_print",b.auto_print);
    if(b.dark)localStorage.setItem("dark",b.dark);
    save();
    syncConfig();
    alert("Restaurado");
  };
  r.readAsText(f);
}

function syncStart(){
  if(!window.fb)return;
  if(!unsub){
    unsub=window.fs.onSnapshot(window.fs.collection(window.db,"pedidos"),snap=>{
      syncing=true;
      let map=new Map(historico.map(p=>[p.id,p]));
      snap.forEach(d=>map.set(d.id,d.data()));
      historico=[...map.values()].sort((a,b)=>new Date(a.data)-new Date(b.data));
      save();
      syncing=false;
      renderCozinha();renderCaixa();resumo();
    });
  }
  
  if(!unsubCustos){
    unsubCustos=window.fs.onSnapshot(window.fs.collection(window.db,"custos"),snap=>{
      syncing=true;
      let map=new Map((custos||[]).map(c=>[c.id,c]));
      snap.forEach(d=>map.set(d.id,d.data()));
      custos=[...map.values()].sort((a,b)=>new Date(a.criadoEm||a.data)-new Date(b.criadoEm||b.data));
      save();syncing=false;
      if(document.getElementById("listaCustos"))renderCustos();
      if(document.getElementById("finOut"))gerarFinanceiro();
    });
  }

  if(!window.unsubConfig){
    window.unsubConfig=window.fs.onSnapshot(window.fs.doc(window.db,"config","geral"),d=>{
      if(!d.exists())return;
      syncing=true;
      let c=d.data();
      if(c.produtos)produtos=c.produtos;
      if(c.categorias)categorias=c.categorias;
      if(c.senhas)senhas=c.senhas;
      if(c.auto_print)localStorage.setItem("auto_print",c.auto_print);
      if(c.dark)localStorage.setItem("dark",c.dark);
      if(c.num)localStorage.setItem("num_bc",c.num);
      save();
      syncing=false;
      dedup();
      if(document.getElementById("produtos"))renderProdutos();
      resumo();
    });
  }
  toast("Nuvem conectada");
}

function renderCaixaPro(){
  const aberto=caixaAberto();
  const ini=aberto?aberto.data.slice(0,10):dataLocalISO();
  const fim=dataLocalISO();
  const vendas=(historico||[]).filter(p=>(p.data||"").slice(0,10)>=ini&&(p.data||"").slice(0,10)<=fim&&p.status==="entregue");
  const totalVendas=vendas.reduce((s,p)=>s+Number(p.total||0),0);
  const sangrias=caixaMovs.filter(m=>m.tipo==="sangria"&&(!aberto||m.caixaId===aberto.id)).reduce((s,m)=>s+Number(m.valor||0),0);
  const suprimentos=caixaMovs.filter(m=>m.tipo==="suprimento"&&(!aberto||m.caixaId===aberto.id)).reduce((s,m)=>s+Number(m.valor||0),0);
  const inicial=aberto?Number(aberto.valor||0):0;
  const esperado=inicial+totalVendas+suprimentos-sangrias;
  if($("caixaResumo"))$("caixaResumo").innerHTML=`<div class=card>
    <b>Resumo do caixa</b><br>
    Valor inicial: ${money(inicial)}<br>
    Vendas entregues: ${money(totalVendas)}<br>
    Suprimentos: ${money(suprimentos)}<br>
    Sangrias: ${money(sangrias)}<br>
    <b>Caixa esperado: ${money(esperado)}</b>
  </div>`;
  if($("caixaMovs"))$("caixaMovs").innerHTML=caixaMovs.slice().reverse().slice(0,80).map(m=>`<div class=card><b>${m.tipo}</b> • ${money(m.valor)}<br>${new Date(m.data).toLocaleString("pt-BR")}<br><small>${m.obs||""}</small></div>`).join("")||"Nenhum movimento.";

  const esperado=Number(aberto.valor||0)+totalVendas+suprimentos-sangrias;

  <h3>Pagamentos</h3><table class=tabela><tr><th>Forma</th><th>Total</th></tr>${Object.keys(porPg).map(k=>`<tr><td>${k}</td><td>${money(porPg[k])}</td></tr>`).join("")}</table>
  <h3>Alertas de estoque</h3>${baixos.map(e=>`<div class=card>⚠️ ${e.nome}: ${e.qtd} ${e.un}</div>`).join("")||"<div class=card>Nenhum alerta.</div>"}`;
}

function admAuditoria(){
  $("areaAdm").innerHTML=`<h3>Auditoria</h3>
  <button class="btn laranja" onclick="baixarAuditoria()">Baixar auditoria CSV</button>
  <div>${auditoria.slice().reverse().slice(0,150).map(l=>`<div class=card><b>${l.acao}</b><br>${new Date(l.data).toLocaleString("pt-BR")} • ${l.perfil}<br><small>${l.detalhe||""}</small></div>`).join("")||"Nenhum log."}</div>`;
}

function baixarAuditoria(){
  let c="\ufeffData,Perfil,Ação,Detalhe\n";
  auditoria.forEach(l=>c+=`"${l.data}","${l.perfil}","${l.acao}","${String(l.detalhe||"").replaceAll('"',"'")}"\n`);
  baixar("auditoria_barraca_da_cris.csv",c,"text/csv");
}

function admTefReady(){
  $("areaAdm").innerHTML=`<h3>TEF Ready</h3>
  <div class=card><b>Status:</b> Estrutura preparada para integração futura.<br><small>Quando a Stone liberar SAK, pinpad e documentação, o botão de pagamento chamará o módulo TEF.</small></div>
  <select id=tefAtivo><option value=nao>Desativado</option><option value=sim>Ativado em homologação</option></select>
  <select id=tefPinpad><option>PPC930</option><option>IPP320</option><option>LANE3000</option><option>Q25</option><option>P200</option></select>
  <input id=tefStoneCode placeholder="StoneCode" value="${tefConfig.stoneCode||""}">
  <input id=tefSak placeholder="SAK / chave de integração" value="${tefConfig.sak||""}">
  <button class="btn verde" onclick="salvarTefConfig()">Salvar configuração TEF</button>
  <button class="btn azul" onclick="simularTef()">Simular pagamento TEF</button>`;
  $("tefAtivo").value=tefConfig.ativo||"nao";
  $("tefPinpad").value=tefConfig.pinpad||"PPC930";
}

function salvarTefConfig(){
  tefConfig={ativo:$("tefAtivo").value,provedor:"Stone TEF",pinpad:$("tefPinpad").value,stoneCode:$("tefStoneCode").value,sak:$("tefSak").value,modo:"homologacao"};
  savePro7();logAcao("tef_config","Pinpad "+tefConfig.pinpad);toast("TEF configurado");
}

function simularTef(){
  const valor=Number(prompt("Valor para simular TEF:","10")||0);
  if(valor<=0)return;
  alert("Simulação TEF\\nEnviado: "+money(valor)+"\\nRetorno: APROVADO\\nNSU: SIM"+Date.now());
  logAcao("tef_simulado",money(valor));
}

function processarPagamento(valor,tipo){
  if(tipo && tipo.includes("Cartão") && tefConfig.ativo==="sim"){
    return {status:"pendente_tef",mensagem:"TEF Stone será chamado nesta camada quando homologado.",valor};
  }
  return {status:"manual",mensagem:"Pagamento manual registrado.",valor};
}

const salvarPedidoOriginalPro7 = salvarPedido;
salvarPedido = async function(){
  const tipo=$("pagamento")?.value||"";
  const valor=total();
  const pg=processarPagamento(valor,tipo);
  if(pg.status==="pendente_tef"){
    const ok=confirm("TEF Ready: pagamento será simulado nesta versão. Confirmar aprovado?");
    if(!ok)return;
  }
  await salvarPedidoOriginalPro7();
  logAcao("pedido_salvo","Pagamento: "+tipo+" | "+money(valor));
};

/* Backup PRO 7 junto com backup JSON antigo */
const backupOriginalPro7 = backup;
backup = function(){
  baixar("backup_pro7_enterprise.json",JSON.stringify({produtos,categorias,historico,custos,senhas,caixaMovs,estoque,fichas,auditoria,tefConfig,
    num:localStorage.getItem("num_bc"),
    auto_print:localStorage.getItem("auto_print"),
    dark:localStorage.getItem("dark")
  },null,2),"application/json");
};

const restaurarOriginalPro7 = restaurar;
restaurar = function(e){
  let f=e.target.files[0];
  if(!f)return;
  let r=new FileReader();
  r.onload=()=>{
    let b=JSON.parse(r.result);
    produtos=b.produtos||produtos; categorias=b.categorias||categorias; historico=b.historico||historico;
    custos=b.custos||custos; senhas=b.senhas||senhas; caixaMovs=b.caixaMovs||caixaMovs; estoque=b.estoque||estoque;
    fichas=b.fichas||fichas; auditoria=b.auditoria||auditoria; tefConfig=b.tefConfig||tefConfig;
    if(b.num)localStorage.setItem("num_bc",b.num);
    if(b.auto_print)localStorage.setItem("auto_print",b.auto_print);
    if(b.dark)localStorage.setItem("dark",b.dark);
    save();savePro7();syncConfig();alert("Backup PRO 7 restaurado");
  };
  r.readAsText(f);
};

logAcao("sistema","PRO 7.0 Enterprise carregado");

</script>
